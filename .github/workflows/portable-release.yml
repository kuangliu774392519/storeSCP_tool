name: portable-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      package_version:
        description: "Optional version label for the portable zip"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Determine package version
        id: vars
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          }
          elseif ("${{ inputs.package_version }}") {
            $version = "${{ inputs.package_version }}"
          }
          else {
            $version = Get-Date -Format "yyyyMMdd_HHmmss"
          }

          "package_version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "package_name=StorescpTool_win-x64_portable_$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Restore
        shell: pwsh
        run: |
          & "C:\Program Files\dotnet\dotnet.exe" restore ".\StorescpTool.sln"

      - name: Test
        shell: pwsh
        run: |
          & "C:\Program Files\dotnet\dotnet.exe" test ".\StorescpTool.sln" --no-restore

      - name: Publish portable package
        shell: pwsh
        run: |
          .\scripts\Publish-StorescpTool.ps1 `
            -Configuration Release `
            -Runtime win-x64 `
            -OutputDir ".artifacts\publish\win-x64" `
            -CreatePortableZip `
            -PackageVersion "${{ steps.vars.outputs.package_version }}" `
            -PackageOutputDir ".artifacts\portable"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.package_name }}
          path: |
            .artifacts/portable/${{ steps.vars.outputs.package_name }}.zip
            .artifacts/portable/${{ steps.vars.outputs.package_name }}.sha256.txt

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: StorescpTool ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            .artifacts/portable/${{ steps.vars.outputs.package_name }}.zip
            .artifacts/portable/${{ steps.vars.outputs.package_name }}.sha256.txt
